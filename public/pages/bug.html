<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Bug - Byte Blog</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .info-container { margin-top: 150px; padding: 4rem 2rem; max-width: 800px; margin-inline: auto; min-height: 70vh; }
        .info-container h1 { font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 2rem; color: var(--accent-primary); }
        .info-content h3 { margin-top: 2rem; margin-bottom: 1rem; color: var(--text-primary); }
        .info-content p { color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.8; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--accent-primary); font-weight: 600; margin-bottom: 2rem; }
        .bug-form { background: var(--bg-secondary); border: 1px solid var(--glass-border); padding: 2rem; border-radius: var(--border-radius); }
        .bug-form label { display: block; margin-bottom: 0.5rem; color: var(--text-primary); font-weight: 500; }
        .bug-form input, .bug-form textarea, .bug-form select { width: 100%; padding: 0.8rem; background: var(--bg-tertiary); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <i class="ph-fill ph-code"></i>
                Byte<span>Blog</span>
            </a>
            <a href="../index.html" class="btn btn-outline">Voltar ao Início</a>
        </div>
    </header>

    <main class="info-container">
        <a href="../index.html" class="back-link"><i class="ph ph-arrow-left"></i> Voltar</a>
        <h1>Reportar Bug</h1>
        
        <div class="info-content">
            <p>Encontrou um comportamento inesperado ou erro visual? Preencha o formulário abaixo para que nossa equipe técnica possa investigar.</p>
            
            <form class="bug-form">
                <label for="bugTitle">Assunto do Erro</label>
                <input type="text" id="bugTitle" placeholder="Ex: O botão de login não funciona no celular" required>

                <label for="bugCategory">Área do Site</label>
                <select id="bugCategory">
                    <option value="login">Login / Cadastro</option>
                    <option value="posts">Criação de Artigos</option>
                    <option value="design">Layout / Visual</option>
                    <option value="perfil">Meu Perfil</option>
                    <option value="outros">Outros</option>
                </select>

                <label for="bugDesc">Descrição Detalhada</label>
                <textarea id="bugDesc" rows="6" placeholder="O que aconteceu? Como podemos reproduzir o erro?" required></textarea>

                <button type="button" onclick="alert('Relatório enviado com sucesso! Obrigado pela ajuda.')" class="btn btn-primary full-width">Enviar Relatório</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Byte Blog. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
